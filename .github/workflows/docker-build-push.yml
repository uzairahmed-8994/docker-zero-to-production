name: Build, Test, and Push

on:
  push:
    branches:
      - main
    paths:
      - '25-ci-cd-with-docker/**'
      - '.github/workflows/docker-build-push.yml'

  pull_request:
    branches:
      - main
    paths:
      - '25-ci-cd-with-docker/**'
      - '.github/workflows/docker-build-push.yml'
      
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for testing
        uses: docker/build-push-action@v5
        with:
          context: ./25-ci-cd-with-docker/backend
          load: true
          tags: backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test backend image
        run: |
          docker run -d \
            --name backend-test \
            -e SKIP_DB_INIT=true \
            -p 5000:5000 \
            backend:test

          # Wait for container startup
          sleep 5

          # Verify health endpoint
          curl -f http://localhost:5000/health || \
            (docker logs backend-test && exit 1)

          docker stop backend-test
          docker rm backend-test

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker tags
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/backend
          tags: |
            type=sha,prefix=git-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./25-ci-cd-with-docker/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max