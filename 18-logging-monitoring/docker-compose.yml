services:
  frontend:
    build: ./frontend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "5001:5001"
    environment:
      - BACKEND_URL=http://backend:5000

    networks:
      - frontend-network
    depends_on:
      - backend

  backend:
    build: ./backend
    image: backend:v1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "5000:5000"

    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appdb
      - DB_USER=appuser
      - DB_PASSWORD=secret
    networks:
      - frontend-network
      - backend-network
    depends_on:
      - db

  db:
      image: postgres:15
      logging:
        driver: json-file
        options:
          max-size: "10m"
          max-file: "3"
      environment:
        - POSTGRES_DB=appdb
        - POSTGRES_USER=appuser
        - POSTGRES_PASSWORD=secret
      volumes:
        - postgres-data:/var/lib/postgresql/data
      networks:
        - backend-network

volumes:
  postgres-data:

networks:
  frontend-network:
  backend-network: