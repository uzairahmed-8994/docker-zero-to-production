services:
  frontend:
    cap_drop:
      - ALL
    build: ./frontend
    restart: on-failure
    mem_limit: 256m
    cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - BACKEND_URL=http://backend:5000

    networks:
      - frontend-network
    depends_on:
      backend:
        condition: service_healthy

  backend:
    read_only: true
    tmpfs:
      - /tmp
      - /run
    cap_drop:
      - ALL
    build: ./backend
    restart: on-failure
    mem_limit: 512m
    cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    image: backend:v1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:5000:5000"

    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appdb
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - frontend-network
      - backend-network
    depends_on:
      db:
        condition: service_healthy

  db:
      image: postgres:15
      restart: unless-stopped
      mem_limit: 512m
      cpus: '0.5'
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
        interval: 5s
        timeout: 5s
        retries: 5
        start_period: 20s
      logging:
        driver: json-file
        options:
          max-size: "10m"
          max-file: "3"
      environment:
        - POSTGRES_DB=appdb
        - POSTGRES_USER=${DB_USER}
        - POSTGRES_PASSWORD=${DB_PASSWORD}
      volumes:
        - postgres-data:/var/lib/postgresql/data
      networks:
        - backend-network

volumes:
  postgres-data:

networks:
  frontend-network:
  backend-network: